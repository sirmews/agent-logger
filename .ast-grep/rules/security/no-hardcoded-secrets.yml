id: no-hardcoded-secrets
category: security
severity: error
language: TypeScript
message: "Never hardcode secrets, API keys, or passwords. Use environment variables."
note: |
  Hardcoded secrets get committed to version control. Use process.env or env bindings.

  Correct:
    const apiKey = process.env.OPENAI_API_KEY;

  Anti-pattern:
    const apiKey = "sk-ant-..."; // Never do this
rule:
  any:
    - pattern: api_key = $VAL
    - pattern: apiKey = $VAL
    - pattern: secret = $VAL
    - pattern: password = $VAL
    - pattern: token = $VAL
    - pattern: authToken = $VAL
  not:
    regex: "(process\\.env|env\\.|import\\.meta\\.env)"
files:
  - "src/**/*.ts"
  - "index.ts"
