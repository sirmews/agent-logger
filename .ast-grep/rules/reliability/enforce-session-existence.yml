id: enforce-session-existence
category: reliability
severity: warning
language: TypeScript
message: "Any database insert into a child table (codex_messages or codex_tool_calls) must have a preceding call to `ensureSessionExists` within the same transaction scope to prevent foreign key constraint failures."
rule:
  any:
    - pattern: '"INSERT INTO codex_messages$$$"'
    - pattern: '`INSERT INTO codex_messages$$$`'
    - pattern: '"INSERT INTO codex_tool_calls$$$"'
    - pattern: '`INSERT INTO codex_tool_calls$$$`'
files:
  - "src/cli/**/*.ts"
